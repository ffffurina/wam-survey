<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520"><rect width="920" height="520" rx="34" fill="#fff8f3"/><g font-family="Inter,Arial"><text x="460" y="58" text-anchor="middle" fill="#3f2e28" font-size="30" font-weight="900">WAM Taxonomy</text><g fill="#fffefa" stroke="#ead8cc" stroke-width="2"><rect x="60" y="112" width="360" height="310" rx="28"/><rect x="500" y="112" width="360" height="310" rx="28"/></g><text x="240" y="158" text-anchor="middle" fill="#9a5c47" font-size="24" font-weight="900">Cascaded / Precursor</text><text x="680" y="158" text-anchor="middle" fill="#9a5c47" font-size="24" font-weight="900">Joint WAM</text><g fill="#3f2e28" font-size="18"><text x="96" y="214">• Video prediction → policy</text><text x="96" y="258">• Latent action → world model</text><text x="96" y="302">• Plan / future state → action</text><text x="96" y="346">• Easier modular training</text><text x="96" y="390">• Risk: interface bottleneck</text><text x="536" y="214">• Future + action in one model</text><text x="536" y="258">• Video-action diffusion / tokens</text><text x="536" y="302">• Stronger coupling and checking</text><text x="536" y="346">• Harder data alignment</text><text x="536" y="390">• Higher training/inference cost</text></g><g stroke="#9a5c47" stroke-width="4" fill="none" stroke-linecap="round"><path d="M420 266 H500"/></g><path d="M500 258l14 8-14 8z" fill="#9a5c47"/></g></svg>